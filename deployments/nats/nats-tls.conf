# NATS server config — production-like TLS + mTLS + JetStream
# Used by docker-compose.prod.yml

port: 4222
http_port: 8222

# JetStream
jetstream {
  store_dir: /data/jetstream
}

# mTLS — require client certificate signed by our CA
tls {
  cert_file:  /tmp/certs/nats-server.pem
  key_file:   /tmp/certs/nats-server.key
  ca_file:    /tmp/certs/rootCA.pem
  verify:     true   # require client cert (mTLS)
  timeout:    5
}

# Authentication
authorization {
  username: $NATS_USERNAME
  password: $NATS_PASSWORD
}

# Limit connections
max_connections: 1000
max_payload: 8MB
