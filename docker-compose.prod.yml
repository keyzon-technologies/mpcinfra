version: "3.8"

# Production-like environment — TLS everywhere
# Run AFTER generating certs: bash scripts/gen_certs.sh
#
# Start:  docker compose -f docker-compose.prod.yml up -d
# Stop:   docker compose -f docker-compose.prod.yml down

services:
  nats-server:
    image: nats:latest
    container_name: nats-server-prod
    command: ["-c", "/etc/nats/nats-tls.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./deployments/nats/nats-tls.conf:/etc/nats/nats-tls.conf:ro
      - ./certs:/certs:ro
      - nats_data:/data/jetstream
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  consul:
    image: consul:1.15.4
    container_name: consul-prod
    ports:
      - "8501:8501"   # HTTPS
      - "8500:8500"   # HTTP (disabled in prod — kept for health UI only)
    volumes:
      - ./certs:/certs:ro
      - consul_data:/consul/data
    command: >
      agent -server -ui
      -node=server-1
      -bootstrap-expect=1
      -client=0.0.0.0
      -https-port=8501
      -cert-file=/certs/consul-server.pem
      -key-file=/certs/consul-server.key
      -ca-file=/certs/rootCA.pem
      -verify-incoming=false
      -verify-outgoing=true
      -verify-server-hostname=false
    restart: always
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  nats_data:
  consul_data:
