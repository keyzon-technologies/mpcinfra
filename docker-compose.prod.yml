# Production-like environment — TLS everywhere
#
# Certs are injected via base64-encoded environment variables.
# Generate and encode certs locally:
#   bash scripts/gen_certs.sh
#   export NATS_TLS_CERT=$(base64 -w 0 certs/nats-server.pem)
#   export NATS_TLS_KEY=$(base64 -w 0 certs/nats-server.key)
#   export NATS_TLS_CA=$(base64 -w 0 certs/rootCA.pem)
#   export CONSUL_TLS_CERT=$(base64 -w 0 certs/consul-server.pem)
#   export CONSUL_TLS_KEY=$(base64 -w 0 certs/consul-server.key)
#   export CONSUL_TLS_CA=$(base64 -w 0 certs/rootCA.pem)
#
# Start:  docker compose -f docker-compose.prod.yml up -d
# Stop:   docker compose -f docker-compose.prod.yml down

services:
  nats-server:
    image: nats:alpine
    container_name: nats-server-prod
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /tmp/certs
        echo "$$NATS_TLS_CERT" | base64 -d > /tmp/certs/nats-server.pem
        echo "$$NATS_TLS_KEY"  | base64 -d > /tmp/certs/nats-server.key
        echo "$$NATS_TLS_CA"   | base64 -d > /tmp/certs/rootCA.pem
        exec nats-server -c /etc/nats/nats-tls.conf
    environment:
      - NATS_TLS_CERT
      - NATS_TLS_KEY
      - NATS_TLS_CA
      - NATS_USERNAME
      - NATS_PASSWORD
    ports:
      - "4222:4222"
    volumes:
      - ./deployments/nats/nats-tls.conf:/etc/nats/nats-tls.conf:ro
      - nats_data:/data/jetstream
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  consul:
    image: consul:1.15.4
    container_name: consul-prod
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /tmp/certs
        echo "$$CONSUL_TLS_CERT" | base64 -d > /tmp/certs/consul-server.pem
        echo "$$CONSUL_TLS_KEY"  | base64 -d > /tmp/certs/consul-server.key
        echo "$$CONSUL_TLS_CA"   | base64 -d > /tmp/certs/rootCA.pem
        exec consul agent -config-file=/etc/consul/consul.hcl
    environment:
      - CONSUL_TLS_CERT
      - CONSUL_TLS_KEY
      - CONSUL_TLS_CA
    ports:
      - "8501:8501"   # HTTPS
    volumes:
      - ./deployments/consul/consul.hcl:/etc/consul/consul.hcl:ro
      - consul_data:/consul/data
    restart: always
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  nats_data:
  consul_data:
